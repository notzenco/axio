name: Bug report
description: Report reproducible incorrect Axio behavior
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the smallest safe set of steps that reproduces it.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Axio version or commit
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Operating system
    validations:
      required: true
